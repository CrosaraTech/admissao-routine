<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AdmitER · Aviso</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
  <meta http-equiv="refresh" content="2;url={{ redirect|default('/') }}">
</head>
<body>
  <div class="app-layout">
    <main class="main" style="margin-left: 0;">
      <div class="card" style="max-width: 600px; margin: 60px auto;">
        <div class="flash flash-{{ tipo|default('info') }}" style="position: static; animation: none; margin: 0 0 16px 0;">
          {{ mensagem }}
        </div>
        <p class="small muted">Redirecionando em 2 segundos…</p>
        <p>
          <a class="btn btn-ghost btn-sm" href="{{ redirect|default('/') }}">Ir agora</a>
        </p>
      </div>
    </main>
  </div>

  <script>
    setTimeout(function () {
      window.location.href = "{{ redirect|default('/') }}";
    }, 2000);
  </script>
</body>
</html>
